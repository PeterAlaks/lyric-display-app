<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LyricDisplay Dock</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #070a12;
        color: #f8fafc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #070a12;
      }

      main {
        display: flex;
        min-height: 100vh;
        flex-direction: column;
        justify-content: center;
        gap: 18px;
        padding: 18px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .brand img {
        height: 34px;
        width: 34px;
        border-radius: 8px;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: #9ca3af;
        font-size: 13px;
        line-height: 1.5;
      }

      .status {
        min-height: 44px;
        border: 1px solid #1f2937;
        border-radius: 8px;
        background: #111827;
        padding: 10px 12px;
        color: #d1d5db;
        font-size: 13px;
      }

      .status.ready {
        border-color: #16a34a;
        color: #bbf7d0;
      }

      .status.error {
        border-color: #dc2626;
        color: #fecaca;
      }

      .actions {
        display: grid;
        gap: 10px;
      }

      button {
        display: inline-flex;
        min-height: 42px;
        width: 100%;
        align-items: center;
        justify-content: center;
        border: 0;
        border-radius: 8px;
        background: #2563eb;
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-size: 14px;
        font-weight: 700;
      }

      button.secondary {
        border: 1px solid #374151;
        background: #111827;
        color: #e5e7eb;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.75;
      }

    </style>
  </head>
  <body>
    <main>
      <div class="brand">
        <img id="appIcon" src="./LyricDisplay-icon.png" alt="" />
        <div>
          <h1>LyricDisplay Dock</h1>
          <p>Connect to LyricDisplay and load the controller in this dock.</p>
        </div>
      </div>

      <div id="status" class="status">Start LyricDisplay in dock mode, then start this dock.</div>

      <div class="actions">
        <button id="startButton" type="button">Start LyricDisplay Dock</button>
        <button id="openDesktopButton" class="secondary" type="button">Open Desktop App</button>
      </div>

      <p>This page will load the LyricDisplay controller here after the background runtime is ready.</p>
    </main>

    <script>
      const statusEl = document.getElementById('status');
      const startButton = document.getElementById('startButton');
      const iconEl = document.getElementById('appIcon');
      const params = new URLSearchParams(window.location.search);
      const mode = params.get('mode');
      const isHttpVitePage = window.location.protocol.startsWith('http') && window.location.port === '5173';
      const isDevMode = mode === 'dev' || isHttpVitePage;
      const devOrigin = 'http://127.0.0.1:5173';
      const productionDockUrl = 'http://127.0.0.1:4000/#/obs-dock';
      const devDockUrl = `${devOrigin}/obs-dock`;
      const readyUrl = 'http://127.0.0.1:4000/api/health/ready';
      const devReadyUrl = `${devOrigin}/obs-dock`;
      let launchInProgress = false;

      iconEl.addEventListener('error', () => {
        if (!iconEl.src.endsWith('/public/LyricDisplay-icon.png')) {
          iconEl.src = './public/LyricDisplay-icon.png';
        }
      });

      const setStatus = (message, className = '') => {
        statusEl.className = `status ${className}`.trim();
        statusEl.textContent = message;
      };

      const canFetch = async (url, predicate = null) => {
        try {
          const response = await fetch(url, { cache: 'no-store' });
          if (!response.ok) return false;
          if (!predicate) return true;
          const payload = await response.json();
          return predicate(payload);
        } catch {
          return false;
        }
      };

      const canReachNoCors = async (url) => {
        try {
          await fetch(url, { cache: 'no-store', mode: 'no-cors' });
          return true;
        } catch {
          return false;
        }
      };

      const checkBackendReady = () => canFetch(
        readyUrl,
        (payload) => payload && payload.status === 'ready' && payload.serverListening
      );

      const checkDevReady = () => canReachNoCors(devReadyUrl);

      const openDockController = async () => {
        if (launchInProgress) {
          setStatus('Connection check is already in progress...');
          return;
        }

        launchInProgress = true;
        startButton.disabled = true;

        setStatus(isDevMode ? 'Checking LyricDisplay dev services...' : 'Checking LyricDisplay background runtime...');

        const backendReady = await checkBackendReady();
        const devReady = isDevMode ? await checkDevReady() : false;

        if (isDevMode) {
          if (backendReady && devReady) {
            setStatus('LyricDisplay dev services are ready. Loading dock controller...', 'ready');
            window.location.href = devDockUrl;
            return;
          }

          if (backendReady && !devReady) {
            setStatus('Backend is running, but Vite is not ready at 127.0.0.1:5173. Keep npm run electron-dev:headless running, then try again.', 'error');
          } else if (!backendReady && devReady) {
            setStatus('Vite is running, but the LyricDisplay backend is not ready. Keep npm run electron-dev:headless running, then try again.', 'error');
          } else {
            setStatus('LyricDisplay dev headless is not running. Run npm run electron-dev:headless, then click Start LyricDisplay Dock.', 'error');
          }

          launchInProgress = false;
          startButton.disabled = false;
          return;
        }

        if (backendReady) {
          setStatus('LyricDisplay is running. Loading dock controller...', 'ready');
          window.location.href = productionDockUrl;
          return;
        }

        setStatus('LyricDisplay Dock background mode is not running. Open LyricDisplay once, enable LyricDisplay Dock Background Mode in Advanced Settings, then launch headless mode.', 'error');
        launchInProgress = false;
        startButton.disabled = false;
      };

      const openDesktopApp = async () => {
        setStatus('Requesting the desktop window...');
        try {
          const response = await fetch('http://127.0.0.1:4000/api/app/open-main-window', {
            method: 'POST',
            cache: 'no-store'
          });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          setStatus('Requested the desktop window.', 'ready');
        } catch {
          setStatus('LyricDisplay background mode is not running. Start LyricDisplay first.', 'error');
        }
      };

      startButton.addEventListener('click', openDockController);
      document.getElementById('openDesktopButton').addEventListener('click', openDesktopApp);

      setStatus(isDevMode
        ? 'Run npm run electron-dev:headless, then start this dock.'
        : 'Enable LyricDisplay Dock Background Mode in LyricDisplay, then start this dock.'
      );
    </script>
  </body>
</html>
