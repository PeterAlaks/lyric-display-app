<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LyricDisplay OBS Dock Dev</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #070a12;
        color: #f8fafc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #070a12;
      }

      main {
        display: flex;
        min-height: 100vh;
        flex-direction: column;
        justify-content: center;
        gap: 18px;
        padding: 18px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .brand img {
        height: 34px;
        width: 34px;
        border-radius: 8px;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: #9ca3af;
        font-size: 13px;
        line-height: 1.5;
      }

      .status {
        min-height: 44px;
        border: 1px solid #1f2937;
        border-radius: 8px;
        background: #111827;
        padding: 10px 12px;
        color: #d1d5db;
        font-size: 13px;
      }

      .status.ready {
        border-color: #16a34a;
        color: #bbf7d0;
      }

      .status.error {
        border-color: #dc2626;
        color: #fecaca;
      }

      .actions {
        display: grid;
        gap: 10px;
      }

      button,
      a.button {
        display: inline-flex;
        min-height: 42px;
        width: 100%;
        align-items: center;
        justify-content: center;
        border: 0;
        border-radius: 8px;
        background: #2563eb;
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-size: 14px;
        font-weight: 700;
        text-decoration: none;
      }

      button.secondary,
      a.button.secondary {
        border: 1px solid #374151;
        background: #111827;
        color: #e5e7eb;
      }

      code {
        overflow-wrap: anywhere;
        color: #bfdbfe;
        font-size: 12px;
      }

    </style>
  </head>
  <body>
    <main>
      <div class="brand">
        <img src="./public/LyricDisplay-icon.png" alt="" />
        <div>
          <h1>LyricDisplay OBS Dock Dev</h1>
          <p>Connect to the development headless runtime without opening the main app window.</p>
        </div>
      </div>

      <div id="status" class="status">Run npm run electron-dev:headless, then open the dock controller.</div>

      <div class="actions">
        <button id="startButton" type="button">Open Dev Dock Controller</button>
        <a id="dockLink" class="button secondary" href="http://localhost:5173/obs-dock">Open Dev Dock Controller</a>
        <button id="openDesktopButton" class="secondary" type="button">Open Dev Desktop App</button>
      </div>

      <p>Dock URL: <code id="dockUrlLabel">http://localhost:5173/obs-dock</code></p>
    </main>

    <script>
      const statusEl = document.getElementById('status');
      const startButton = document.getElementById('startButton');
      let launchInProgress = false;

      const dockUrl = 'http://localhost:5173/obs-dock';
      const backendReadyUrl = 'http://127.0.0.1:4000/api/health/ready';
      const viteReadyUrl = 'http://localhost:5173/obs-dock.html';

      document.getElementById('dockLink').href = dockUrl;
      document.getElementById('dockUrlLabel').textContent = dockUrl;

      const setStatus = (message, className = '') => {
        statusEl.className = `status ${className}`.trim();
        statusEl.textContent = message;
      };

      const canFetch = async (url, predicate = null) => {
        try {
          const response = await fetch(url, { cache: 'no-store' });
          if (!response.ok) return false;
          if (!predicate) return true;
          const payload = await response.json();
          return predicate(payload);
        } catch {
          return false;
        }
      };

      const checkBackendReady = () => canFetch(
        backendReadyUrl,
        (payload) => payload && payload.status === 'ready' && payload.serverListening
      );

      const checkViteReady = () => canFetch(viteReadyUrl);

      const checkReady = async () => {
        const backendReady = await checkBackendReady();
        const viteReady = await checkViteReady();
        return { backendReady, viteReady, ready: backendReady && viteReady };
      };

      const openDockController = async () => {
        if (launchInProgress) {
          setStatus('Connection check is already in progress...');
          return;
        }

        launchInProgress = true;
        startButton.disabled = true;

        setStatus('Checking LyricDisplay dev services...');
        const state = await checkReady();

        if (state.ready) {
          setStatus('Dev services are ready. Opening dock controller...', 'ready');
          window.location.href = dockUrl;
          return;
        }

        if (state.backendReady && !state.viteReady) {
          setStatus('Backend is running, but Vite is not ready. Start Vite or run npm run electron-dev:headless.', 'error');
        } else if (!state.backendReady && state.viteReady) {
          setStatus('Vite is running, but the LyricDisplay backend is not ready. Run npm run electron-dev:headless.', 'error');
        } else {
          setStatus('LyricDisplay dev headless is not running. Run npm run electron-dev:headless, then click Open Dev Dock Controller.', 'error');
        }

        launchInProgress = false;
        startButton.disabled = false;
      };

      const openDesktopApp = async () => {
        setStatus('Requesting the dev desktop window...');
        try {
          const response = await fetch('http://127.0.0.1:4000/api/app/open-main-window', {
            method: 'POST',
            cache: 'no-store'
          });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          setStatus('Requested the dev desktop window.', 'ready');
        } catch {
          setStatus('LyricDisplay dev headless is not running. Run npm run electron-dev:headless first.', 'error');
        }
      };

      startButton.addEventListener('click', openDockController);
      document.getElementById('dockLink').addEventListener('click', (event) => {
        event.preventDefault();
        openDockController();
      });
      document.getElementById('openDesktopButton').addEventListener('click', openDesktopApp);

      setStatus('Run npm run electron-dev:headless, then open the dock controller.');
    </script>
  </body>
</html>
