<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LyricDisplay OBS Dock Dev</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #070a12;
        color: #f8fafc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #070a12;
      }

      main {
        display: flex;
        min-height: 100vh;
        flex-direction: column;
        justify-content: center;
        gap: 18px;
        padding: 18px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .brand img {
        height: 34px;
        width: 34px;
        border-radius: 8px;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: #9ca3af;
        font-size: 13px;
        line-height: 1.5;
      }

      .status {
        min-height: 44px;
        border: 1px solid #1f2937;
        border-radius: 8px;
        background: #111827;
        padding: 10px 12px;
        color: #d1d5db;
        font-size: 13px;
      }

      .status.ready {
        border-color: #16a34a;
        color: #bbf7d0;
      }

      .status.error {
        border-color: #dc2626;
        color: #fecaca;
      }

      .actions {
        display: grid;
        gap: 10px;
      }

      button,
      a.button {
        display: inline-flex;
        min-height: 42px;
        width: 100%;
        align-items: center;
        justify-content: center;
        border: 0;
        border-radius: 8px;
        background: #2563eb;
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-size: 14px;
        font-weight: 700;
        text-decoration: none;
      }

      button.secondary,
      a.button.secondary {
        border: 1px solid #374151;
        background: #111827;
        color: #e5e7eb;
      }

      code {
        overflow-wrap: anywhere;
        color: #bfdbfe;
        font-size: 12px;
      }

      .hidden-frame {
        display: none;
        height: 0;
        width: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">
        <img src="./public/LyricDisplay-icon.png" alt="" />
        <div>
          <h1>LyricDisplay OBS Dock Dev</h1>
          <p>Start the development backend and Vite dock UI without opening the main app window.</p>
        </div>
      </div>

      <div id="status" class="status">Checking local LyricDisplay dev services...</div>

      <div class="actions">
        <button id="startButton" type="button">Start Dev Headless and Open Dock</button>
        <a id="dockLink" class="button secondary" href="http://localhost:5173/obs-dock">Open Dev Dock Controller</a>
        <button id="openDesktopButton" class="secondary" type="button">Open Dev Desktop App</button>
      </div>

      <p>Dock URL: <code id="dockUrlLabel">http://localhost:5173/obs-dock</code></p>
      <iframe id="protocolFrame" class="hidden-frame" title=""></iframe>
    </main>

    <script>
      const statusEl = document.getElementById('status');
      const startButton = document.getElementById('startButton');
      const protocolFrame = document.getElementById('protocolFrame');
      const pageParams = new URLSearchParams(window.location.search || '');
      let launchInProgress = false;

      const createPairingToken = () => {
        const bytes = new Uint8Array(32);
        if (window.crypto && window.crypto.getRandomValues) {
          window.crypto.getRandomValues(bytes);
        } else {
          for (let index = 0; index < bytes.length; index += 1) {
            bytes[index] = Math.floor(Math.random() * 256);
          }
        }
        return Array.from(bytes, (byte) => byte.toString(16).padStart(2, '0')).join('');
      };

      const requestedPairingToken = pageParams.get('obsPairingToken');
      const pairingToken = requestedPairingToken && requestedPairingToken.trim().length >= 32
        ? requestedPairingToken.trim()
        : createPairingToken();

      const dockUrl = `http://localhost:5173/obs-dock?obsPairingToken=${encodeURIComponent(pairingToken)}`;
      const backendReadyUrl = 'http://127.0.0.1:4000/api/health/ready';
      const viteReadyUrl = 'http://localhost:5173/obs-dock.html';

      document.getElementById('dockLink').href = dockUrl;
      document.getElementById('dockUrlLabel').textContent = dockUrl;

      const setStatus = (message, className = '') => {
        statusEl.className = `status ${className}`.trim();
        statusEl.textContent = message;
      };

      const requestProtocolLaunch = (url) => {
        try {
          protocolFrame.src = 'about:blank';
          window.setTimeout(() => {
            protocolFrame.src = url;
          }, 0);
        } catch {
        }
      };

      const canFetch = async (url, predicate = null) => {
        try {
          const response = await fetch(url, { cache: 'no-store' });
          if (!response.ok) return false;
          if (!predicate) return true;
          const payload = await response.json();
          return predicate(payload);
        } catch {
          return false;
        }
      };

      const checkBackendReady = () => canFetch(
        backendReadyUrl,
        (payload) => payload && payload.status === 'ready' && payload.serverListening
      );

      const checkViteReady = () => canFetch(viteReadyUrl);

      const checkReady = async () => {
        const backendReady = await checkBackendReady();
        const viteReady = await checkViteReady();
        return { backendReady, viteReady, ready: backendReady && viteReady };
      };

      const pollReady = async ({ navigate = false, attempts = 60, pendingMessage = 'Waiting for dev services...' } = {}) => {
        for (let attempt = 0; attempt < attempts; attempt += 1) {
          const state = await checkReady();
          if (state.ready) {
            setStatus(navigate ? 'Dev services are ready. Opening dock controller...' : 'Dev services are ready.', 'ready');
            if (navigate) window.location.href = dockUrl;
            return true;
          }
          if (attempt === 0) {
            setStatus(pendingMessage);
          } else if (state.backendReady && !state.viteReady) {
            setStatus('Backend is ready. Waiting for Vite dev UI...');
          } else if (!state.backendReady && state.viteReady) {
            setStatus('Vite is ready. Waiting for LyricDisplay backend...');
          }
          await new Promise((resolve) => setTimeout(resolve, 750));
        }

        return false;
      };

      const launchHeadlessAndPair = async () => {
        if (launchInProgress) {
          setStatus('Startup request is already in progress...');
          return;
        }

        launchInProgress = true;
        startButton.disabled = true;

        const state = await checkReady();
        if (state.ready) {
          setStatus('Dev services are already running. Opening dock controller...', 'ready');
          window.location.href = dockUrl;
          return;
        }

        setStatus('Requesting LyricDisplay dev headless startup...');
        requestProtocolLaunch(`lyricdisplay-dev://start-headless?startDevServer=1&obsPairingToken=${encodeURIComponent(pairingToken)}`);
        window.setTimeout(async () => {
          const ready = await pollReady({
            navigate: true,
            attempts: 80,
            pendingMessage: 'Waiting for LyricDisplay dev services to start...'
          });

          if (!ready) {
            setStatus('The dev app link did not start LyricDisplay. Run npm run electron-dev:headless once so Windows registers lyricdisplay-dev:// to this repo, then use this launcher again.', 'error');
            launchInProgress = false;
            startButton.disabled = false;
          }
        }, 1200);
      };

      startButton.addEventListener('click', launchHeadlessAndPair);
      document.getElementById('dockLink').addEventListener('click', async (event) => {
        event.preventDefault();
        if ((await checkReady()).ready) {
          window.location.href = dockUrl;
          return;
        }
        launchHeadlessAndPair();
      });
      document.getElementById('openDesktopButton').addEventListener('click', () => {
        requestProtocolLaunch('lyricdisplay-dev://open?startDevServer=1');
      });

      pollReady({ navigate: true, attempts: 4, pendingMessage: 'Checking local LyricDisplay dev services...' }).then((ready) => {
        if (!ready) {
          setStatus('LyricDisplay dev services are not running. Click Start Dev Headless and Open Dock.', '');
        }
      });
    </script>
  </body>
</html>
