<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LyricDisplay OBS Dock</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #070a12;
        color: #f8fafc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #070a12;
      }

      main {
        display: flex;
        min-height: 100vh;
        flex-direction: column;
        justify-content: center;
        gap: 18px;
        padding: 18px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .brand img {
        height: 34px;
        width: 34px;
        border-radius: 8px;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: #9ca3af;
        font-size: 13px;
        line-height: 1.5;
      }

      .status {
        min-height: 44px;
        border: 1px solid #1f2937;
        border-radius: 8px;
        background: #111827;
        padding: 10px 12px;
        color: #d1d5db;
        font-size: 13px;
      }

      .status.ready {
        border-color: #16a34a;
        color: #bbf7d0;
      }

      .status.error {
        border-color: #dc2626;
        color: #fecaca;
      }

      .actions {
        display: grid;
        gap: 10px;
      }

      button,
      a.button {
        display: inline-flex;
        min-height: 42px;
        width: 100%;
        align-items: center;
        justify-content: center;
        border: 0;
        border-radius: 8px;
        background: #2563eb;
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-size: 14px;
        font-weight: 700;
        text-decoration: none;
      }

      button.secondary,
      a.button.secondary {
        border: 1px solid #374151;
        background: #111827;
        color: #e5e7eb;
      }

      code {
        overflow-wrap: anywhere;
        color: #bfdbfe;
        font-size: 12px;
      }

    </style>
  </head>
  <body>
    <main>
      <div class="brand">
        <img src="./LyricDisplay-icon.png" alt="" />
        <div>
          <h1>LyricDisplay OBS Dock</h1>
          <p>Connect to the LyricDisplay background runtime and open the dock controller.</p>
        </div>
      </div>

      <div id="status" class="status">Enable OBS Dock Background Mode in LyricDisplay, then open the dock controller.</div>

      <div class="actions">
        <button id="startButton" type="button">Open Dock Controller</button>
        <a id="dockLink" class="button secondary" href="http://127.0.0.1:4000/#/obs-dock">Open Dock Controller</a>
        <button id="openDesktopButton" class="secondary" type="button">Open Desktop App</button>
      </div>

      <p>Dock URL: <code id="dockUrlLabel">http://127.0.0.1:4000/#/obs-dock</code></p>
    </main>

    <script>
      const statusEl = document.getElementById('status');
      const startButton = document.getElementById('startButton');
      const isViteDev = window.location.protocol.startsWith('http') && window.location.port === '5173';
      let launchInProgress = false;
      const dockUrl = isViteDev
        ? `${window.location.origin}/obs-dock`
        : 'http://127.0.0.1:4000/#/obs-dock';
      const readyUrl = 'http://127.0.0.1:4000/api/health/ready';
      document.getElementById('dockLink').href = dockUrl;
      document.getElementById('dockUrlLabel').textContent = dockUrl;

      const setStatus = (message, className = '') => {
        statusEl.className = `status ${className}`.trim();
        statusEl.textContent = message;
      };

      const checkReady = async () => {
        try {
          const response = await fetch(readyUrl, { cache: 'no-store' });
          if (!response.ok) return false;
          const payload = await response.json();
          return payload && payload.status === 'ready' && payload.serverListening;
        } catch {
          return false;
        }
      };

      const openDockController = async () => {
        if (launchInProgress) {
          setStatus('Connection check is already in progress...');
          return;
        }

        launchInProgress = true;
        startButton.disabled = true;

        setStatus('Checking LyricDisplay background runtime...');
        if (await checkReady()) {
          setStatus('LyricDisplay is running. Opening dock controller...', 'ready');
          window.location.href = dockUrl;
          return;
        }

        setStatus('LyricDisplay background mode is not running. Open LyricDisplay once, enable OBS Dock Background Mode in Advanced Settings, then sign out/in or start LyricDisplay headless.', 'error');
        launchInProgress = false;
        startButton.disabled = false;
      };

      const openDesktopApp = async () => {
        setStatus('Requesting the desktop window...');
        try {
          const response = await fetch('http://127.0.0.1:4000/api/app/open-main-window', {
            method: 'POST',
            cache: 'no-store'
          });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          setStatus('Requested the desktop window.', 'ready');
        } catch {
          setStatus('LyricDisplay background mode is not running. Start LyricDisplay first.', 'error');
        }
      };

      startButton.addEventListener('click', openDockController);
      document.getElementById('dockLink').addEventListener('click', (event) => {
        event.preventDefault();
        openDockController();
      });
      document.getElementById('openDesktopButton').addEventListener('click', openDesktopApp);

      setStatus('Enable OBS Dock Background Mode in LyricDisplay, then open the dock controller.');
    </script>
  </body>
</html>
